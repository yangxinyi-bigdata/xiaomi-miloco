services:
  backend:
    container_name: miloco-backend
    image: ${DOCKER_REPO}yangxinyi-bigdata/miloco-backend:latest
    # NOTICE: MUST be host for miot device discovery.
    network_mode: host
    expose:
      - ${BACKEND_PORT:-8000}
    environment:
      - BACKEND_HOST=${BACKEND_HOST:-0.0.0.0}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - AI_ENGINE_HOST=${AI_ENGINE_HOST:-0.0.0.0}
      - AI_ENGINE_PORT=${AI_ENGINE_PORT:-8001}
      - BACKEND_LOG_LEVEL=${BACKEND_LOG_LEVEL:-info}
      - CODEX_HOME=${CODEX_HOME:-/root/.codex}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./data:/app/miloco_server/.temp
      - ./log/backend:/app/miloco_server/.temp/log
    # NOTICE: Mount configuration files, if you want to use your own configuration files, please mount them here.
      - type: bind
        source: ./config/server_config.yaml
        target: /app/config/server_config.yaml
      - type: bind
        source: ./config/prompt_config.yaml
        target: /app/config/prompt_config.yaml
    # NOTICE: Mount your Codex CLI credential directory if you want to reuse a local Codex login.
    #  - type: bind
    #    source: ${CODEX_HOST_HOME:-~/.codex}
    #    target: ${CODEX_HOME:-/root/.codex}
    #    read_only: true
    restart: unless-stopped
    healthcheck:
      disable: true
